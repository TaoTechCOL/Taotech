<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaoTech | Tecnología Accesible para Todos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* ══════════════════════════════════════════════
           TEMA CLARO (default)
        ══════════════════════════════════════════════ */
        :root,
        [data-theme="light"] {
            --bg:          #f4ede0;
            --bg-soft:     #ebe0cc;
            --bg-card:     #f4ede0;
            --bg-input:    #fffcf5;
            --bg-dark:     #1f1a14;
            --ink:         #1f1a14;
            --ink-soft:    #5c5346;
            --ink-muted:   #5c5346;
            --accent:      #b14a2c;
            --accent-deep: #8a3820;
            --gold:        #c39a4a;
            --line:        #d6c8af;
            --white:       #fffcf5;
            --nav-bg:      rgba(244,237,224,0.97);
            --shadow-hover:0 12px 32px rgba(177,74,44,0.1);
            --tag-bg:      rgba(177,74,44,0.08);
            --icon-bg:     rgba(177,74,44,0.1);
            --icon-bg-hover: rgba(177,74,44,0.18);
            --footer-text: #5c5346;
            --footer-title:#d6c8af;
            /* Burger en light: fondo oscuro, líneas claras */
            --burger-bg:    #1f1a14;
            --burger-line:  #f4ede0;
        }

        /* ══════════════════════════════════════════════
           TEMA OSCURO
        ══════════════════════════════════════════════ */
        [data-theme="dark"] {
            --bg:          #1a1612;
            --bg-soft:     #241e18;
            --bg-card:     #2a2319;
            --bg-input:    #2a2319;
            --bg-dark:     #0f0c09;
            --ink:         #f4ede0;
            --ink-soft:    #c0b39a;
            --ink-muted:   #a89a82;
            --accent:      #d96847;
            --accent-deep: #b14a2c;
            --gold:        #d4ab5e;
            --line:        #3d3327;
            --white:       #2a2319;
            --nav-bg:      rgba(26,22,18,0.97);
            --shadow-hover:0 12px 32px rgba(217,104,71,0.15);
            --tag-bg:      rgba(217,104,71,0.15);
            --icon-bg:     rgba(217,104,71,0.15);
            --icon-bg-hover: rgba(217,104,71,0.25);
            --footer-text: #a89a82;
            --footer-title:#d4ab5e;
            /* Burger en dark: fondo accent (naranja), líneas claras → bien visible */
            --burger-bg:    #d96847;
            --burger-line:  #1a1612;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family:'DM Sans',sans-serif;
            background:var(--bg);
            color:var(--ink);
            overflow-x:hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        h1,h2,h3,h4,h5,h6 { font-family:'Outfit',sans-serif; }
        #root { min-height:100vh; }

        .mobile-menu-overlay {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(15,12,9,0.97); backdrop-filter:blur(10px);
            z-index:9999; display:flex; flex-direction:column; align-items:center;
            justify-content:center; gap:2rem; animation:fadeIn 0.3s ease;
        }
        .mobile-menu-overlay a {
            color:#f4ede0; text-decoration:none; font-size:1.5rem; font-weight:600;
            font-family:'Outfit',sans-serif; transition: color 0.2s ease;
        }
        .mobile-menu-overlay a:hover { color:#d96847; }
        .mobile-menu-close {
            position:absolute; top:1rem; right:5%;
            width:48px; height:48px;
            background:#d96847; color:#fff;
            border:none; border-radius:8px;
            font-size:1.5rem; font-weight:700;
            cursor:pointer; display:flex;
            align-items:center; justify-content:center;
            transition: transform 0.2s ease, background 0.2s ease;
            z-index:10000;
            line-height:1;
        }
        .mobile-menu-close:hover { transform: scale(1.08); background:#b14a2c; }
        .mobile-menu-close:active { transform: scale(0.95); }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }

        /* ── Theme toggle button ── */
        .theme-toggle {
            width: 42px; height: 42px;
            background: var(--bg-soft);
            border: 1.5px solid var(--line);
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }
        .theme-toggle svg {
            width: 20px; height: 20px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .theme-toggle:hover svg { transform: rotate(20deg); }
        [data-theme="dark"] .theme-toggle svg { transform: rotate(360deg); }
        [data-theme="dark"] .theme-toggle:hover svg { transform: rotate(380deg); }

        /* ── Burger button (fix para mobile / dark) ── */
        .burger-btn {
            width: 42px;
            height: 42px;
            background: var(--burger-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 0;
            flex-shrink: 0;
            transition: transform 0.2s ease, background 0.3s ease;
        }
        .burger-btn:hover { transform: scale(1.05); }
        .burger-btn span {
            display: block;
            width: 20px;
            height: 2.5px;
            background: var(--burger-line);
            border-radius: 2px;
            transition: background 0.3s ease;
        }

        /* ── Service cards: equal height grid ── */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(1rem, 2vw, 1.5rem);
            align-items: stretch;
        }
        @media (max-width: 1100px) {
            .services-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 820px) {
            .services-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 520px) {
            .services-grid { grid-template-columns: 1fr; }
        }
        .service-card {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: clamp(1.5rem, 3vw, 2.2rem);
            transition: all 0.35s ease;
            cursor: pointer;
            height: 100%;
        }
        .service-card:hover {
            background: var(--white);
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }
        .service-card .icon-wrap {
            width: 58px; height: 58px;
            background: var(--icon-bg);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1.25rem;
            transition: background 0.35s ease;
            flex-shrink: 0;
        }
        .service-card:hover .icon-wrap {
            background: var(--icon-bg-hover);
        }
        .service-card h3 {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 800;
            color: var(--ink);
            margin-bottom: 0.6rem;
        }
        .service-card p {
            color: var(--ink-soft);
            line-height: 1.7;
            font-size: clamp(0.85rem, 1.8vw, 0.95rem);
            flex: 1;
            margin-bottom: 1.25rem;
        }
        .service-card .tags {
            display: flex; gap: 0.45rem; flex-wrap: wrap;
            margin-top: auto;
        }
        .service-card .tag {
            padding: 0.3rem 0.7rem;
            background: var(--tag-bg);
            border-radius: 4px;
            font-size: clamp(0.7rem, 1.4vw, 0.78rem);
            font-weight: 600;
            color: var(--accent);
        }

        /* ── Form toast ── */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;
            padding: 1rem 1.5rem; border-radius: 8px;
            font-family: 'Outfit', sans-serif; font-weight: 600;
            font-size: 0.95rem; color: #fff;
            animation: slideUp 0.4s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }
        .toast.success { background: #2d6a4f; }
        .toast.error   { background: #b14a2c; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        @media (max-width:1024px) { .desktop-nav{display:none!important} .mobile-menu-btn{display:flex!important} }
        @media (min-width:1025px) { .desktop-nav{display:flex!important} .mobile-menu-btn{display:none!important} }

        /* ── Marquee infinito de logos clientes ── */
        .logos-marquee {
            position: relative;
            width: 100%;
            overflow: hidden;
            /* Fades a izquierda y derecha para que se vea más pulido */
            -webkit-mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
                    mask-image: linear-gradient(to right, transparent, #000 10%, #000 90%, transparent);
        }
        .logos-track {
            display: flex;
            width: max-content;
            animation: scrollLogos 40s linear infinite;
            gap: clamp(3rem, 7vw, 6rem);
            align-items: center;
            padding: 1rem 0;
        }
        .logos-marquee:hover .logos-track {
            animation-play-state: paused;
        }
        .logo-slot {
            width: clamp(160px, 18vw, 220px);
            height: clamp(80px, 9vw, 110px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .client-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0.7;
            filter: grayscale(30%);
            transition: opacity 0.3s ease, filter 0.3s ease;
        }
        .client-logo:hover {
            opacity: 1;
            filter: grayscale(0%);
        }
        [data-theme="dark"] .client-logo {
            filter: grayscale(30%) brightness(0) invert(1);
        }
        [data-theme="dark"] .client-logo:hover {
            filter: brightness(0) invert(1);
        }
        @keyframes scrollLogos {
            from { transform: translateX(0); }
            to   { transform: translateX(calc(-50% - clamp(1rem, 2.5vw, 2rem))); }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, createContext, useContext } = React;

const ThemeContext = createContext();

const ThemeProvider = ({children}) => {
    const [theme, setTheme] = useState(() => {
        const saved = localStorage.getItem('taotech-theme');
        if (saved === 'dark' || saved === 'light') return saved;
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            return 'dark';
        }
        return 'light';
    });

    useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('taotech-theme', theme);
    }, [theme]);

    const toggleTheme = () => setTheme(prev => prev === 'light' ? 'dark' : 'light');

    return (
        <ThemeContext.Provider value={{theme, toggleTheme}}>
            {children}
        </ThemeContext.Provider>
    );
};

const useTheme = () => useContext(ThemeContext);

const ThemeToggle = () => {
    const {theme, toggleTheme} = useTheme();
    return (
        <button
            className="theme-toggle"
            onClick={toggleTheme}
            aria-label={theme === 'light' ? 'Cambiar a modo oscuro' : 'Cambiar a modo claro'}
            title={theme === 'light' ? 'Modo oscuro' : 'Modo claro'}
        >
            {theme === 'light' ? (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--ink)'}}>
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            ) : (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'var(--gold)'}}>
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
            )}
        </button>
    );
};

const useScrollAnimation = (threshold=0.1) => {
    const ref = useRef(null);
    const [isVisible,setIsVisible] = useState(false);
    useEffect(()=>{
        const observer = new IntersectionObserver(
            ([entry])=>{ if(entry.isIntersecting) setIsVisible(true); },
            {threshold, rootMargin:'0px 0px -50px 0px'}
        );
        if(ref.current) observer.observe(ref.current);
        return ()=>observer.disconnect();
    },[threshold]);
    return [ref,isVisible];
};

const AnimatedSection = ({children,delay=0,className=''}) => {
    const [ref,isVisible] = useScrollAnimation();
    return (
        <div ref={ref} className={className} style={{
            opacity:isVisible?1:0,
            transform:isVisible?'translateY(0)':'translateY(40px)',
            transition:`all 0.7s cubic-bezier(0.4,0,0.2,1) ${delay}s`
        }}>{children}</div>
    );
};

const TaoLogo = ({size=45, forceDark=false}) => {
    const {theme} = useTheme();
    const isDark = forceDark || theme === 'dark';
    const bg     = isDark ? '#1f1a14' : '#f4ede0';
    const ring   = isDark ? '#f4ede0' : '#1f1a14';
    const kanji  = isDark ? '#f4ede0' : '#1f1a14';
    return (
        <svg width={size} height={size} viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill={bg} stroke={ring} strokeWidth="3"/>
            <circle cx="50" cy="50" r="40" fill="none" stroke="#b14a2c" strokeWidth="1.2" strokeDasharray="5 3"/>
            <text x="50" y="67" fontFamily="Georgia,'Times New Roman',serif"
                fontSize="52" fontWeight="700" fill={kanji} textAnchor="middle">道</text>
            <rect x="82" y="10" width="6" height="6" fill="#b14a2c"/>
            <rect x="89" y="5"  width="4" height="4" fill="#c39a4a"/>
            <rect x="94" y="1"  width="2" height="2" fill="#c39a4a"/>
        </svg>
    );
};

const Navigation = () => {
    const [scrolled,setScrolled] = useState(false);
    const [mobileOpen,setMobileOpen] = useState(false);
    useEffect(()=>{
        const h=()=>setScrolled(window.scrollY>50);
        window.addEventListener('scroll',h);
        return ()=>window.removeEventListener('scroll',h);
    },[]);
    const nav={position:'fixed',top:0,width:'100%',padding:scrolled?'0.75rem 5%':'1rem 5%',
        display:'flex',justifyContent:'space-between',alignItems:'center',zIndex:1000,
        background:scrolled?'var(--nav-bg)':'transparent',
        backdropFilter:scrolled?'blur(20px)':'none',
        boxShadow:scrolled?'0 4px 30px rgba(177,74,44,0.08)':'none',
        borderBottom:scrolled?'1px solid var(--line)':'none',transition:'all 0.3s ease'};
    const cta={padding:'0.7rem 1.4rem',background:'var(--ink)',color:'var(--bg)',border:'none',
        borderRadius:'4px',fontFamily:'Outfit,sans-serif',fontWeight:'600',fontSize:'0.9rem',cursor:'pointer'};
    return (
        <>
        <nav style={nav}>
            <a href="#" style={{display:'flex',alignItems:'center',gap:'0.6rem',textDecoration:'none'}}>
                <TaoLogo size={40}/>
                <span style={{fontSize:'clamp(1.3rem,4vw,1.6rem)',fontWeight:'800',fontFamily:'Outfit,sans-serif',color:'var(--ink)'}}>
                    Tao<span style={{color:'var(--accent)'}}>Tech</span>
                </span>
            </a>
            <ul style={{display:'flex',gap:'clamp(1rem,3vw,2.5rem)',listStyle:'none',alignItems:'center'}} className="desktop-nav">
                <li><a href="#servicios"     style={{color:'var(--ink-soft)',textDecoration:'none',fontWeight:'600',fontSize:'0.95rem'}}>Servicios</a></li>
                <li><a href="#como-funciona" style={{color:'var(--ink-soft)',textDecoration:'none',fontWeight:'600',fontSize:'0.95rem'}}>Proceso</a></li>
                <li><a href="#beneficios"    style={{color:'var(--ink-soft)',textDecoration:'none',fontWeight:'600',fontSize:'0.95rem'}}>Beneficios</a></li>
                <li><a href="#contacto"      style={{color:'var(--ink-soft)',textDecoration:'none',fontWeight:'600',fontSize:'0.95rem'}}>Contacto</a></li>
                <li><button style={cta} onClick={()=>document.getElementById('contacto').scrollIntoView({behavior:'smooth'})}>Comenzar</button></li>
                <li><ThemeToggle/></li>
            </ul>
            <div style={{display:'flex',gap:'0.6rem',alignItems:'center'}} className="mobile-menu-btn">
                <ThemeToggle/>
                <button
                    className="burger-btn"
                    onClick={()=>setMobileOpen(true)}
                    aria-label="Abrir menú"
                >
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
        {mobileOpen && (
            <div className="mobile-menu-overlay">
                <button
                    type="button"
                    className="mobile-menu-close"
                    onClick={()=>setMobileOpen(false)}
                    aria-label="Cerrar menú"
                >✕</button>
                <a href="#servicios"     onClick={()=>setMobileOpen(false)}>Servicios</a>
                <a href="#como-funciona" onClick={()=>setMobileOpen(false)}>Proceso</a>
                <a href="#beneficios"    onClick={()=>setMobileOpen(false)}>Beneficios</a>
                <a href="#contacto"      onClick={()=>setMobileOpen(false)}>Contacto</a>
                <button
                    type="button"
                    onClick={()=>{
                        setMobileOpen(false);
                        setTimeout(()=>document.getElementById('contacto').scrollIntoView({behavior:'smooth'}), 100);
                    }}
                    style={{padding:'1rem 2rem',background:'#b14a2c',color:'#f4ede0',border:'none',borderRadius:'4px',fontFamily:'Outfit,sans-serif',fontWeight:'700',fontSize:'1rem',cursor:'pointer',marginTop:'1rem'}}
                >Comenzar</button>
            </div>
        )}
        </>
    );
};

const Hero = () => (
    <section style={{minHeight:'100vh',display:'flex',alignItems:'center',
        padding:'clamp(100px,15vh,140px) 5% clamp(60px,10vh,100px)',
        background:'var(--bg)',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'-20%',right:'-10%',width:'60%',height:'140%',
            background:'radial-gradient(ellipse at center,rgba(177,74,44,0.07) 0%,transparent 70%)',pointerEvents:'none'}}/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(min(100%,450px),1fr))',
            gap:'clamp(2rem,5vw,4rem)',alignItems:'center',maxWidth:'1400px',margin:'0 auto',width:'100%'}}>
            <AnimatedSection>
                <div style={{maxWidth:'600px'}}>
                    <div style={{display:'inline-flex',alignItems:'center',gap:'0.5rem',
                        padding:'0.5rem 1rem',background:'var(--icon-bg)',
                        border:'1px solid rgba(177,74,44,0.2)',borderRadius:'4px',
                        fontSize:'clamp(0.75rem,2vw,0.85rem)',fontWeight:'600',color:'var(--accent)',marginBottom:'1.5rem'}}>
                        <span>☯</span><span>El equilibrio perfecto</span>
                    </div>
                    <h1 style={{fontSize:'clamp(2rem,6vw,3.5rem)',fontWeight:'900',lineHeight:'1.15',
                        color:'var(--ink)',marginBottom:'1.5rem'}}>
                        Impulsa tu negocio con{' '}
                        <span style={{color:'var(--accent)'}}>tecnología accesible</span>
                    </h1>
                    <p style={{fontSize:'clamp(1rem,2.5vw,1.2rem)',color:'var(--ink-soft)',lineHeight:'1.8',marginBottom:'2rem'}}>
                        Conectamos personas y negocios con programadores profesionales.
                        Desarrollo web, apps y soluciones digitales a medida, de forma sencilla y al alcance de todos.
                    </p>
                    <div style={{display:'flex',gap:'1rem',flexWrap:'wrap'}}>
                        <button onClick={()=>document.getElementById('contacto').scrollIntoView({behavior:'smooth'})}
                            style={{padding:'clamp(0.8rem,2vw,1rem) clamp(1.5rem,4vw,2.5rem)',
                            background:'var(--ink)',color:'var(--bg)',border:'none',borderRadius:'4px',
                            fontFamily:'Outfit,sans-serif',fontWeight:'700',fontSize:'clamp(0.9rem,2vw,1rem)',cursor:'pointer'}}>
                            Solicitar Cotización
                        </button>
                        <button onClick={()=>document.getElementById('servicios').scrollIntoView({behavior:'smooth'})}
                            style={{padding:'clamp(0.8rem,2vw,1rem) clamp(1.5rem,4vw,2.5rem)',
                            background:'transparent',color:'var(--accent)',border:'2px solid var(--accent)',borderRadius:'4px',
                            fontFamily:'Outfit,sans-serif',fontWeight:'700',fontSize:'clamp(0.9rem,2vw,1rem)',cursor:'pointer'}}>
                            Ver Servicios
                        </button>
                    </div>
                </div>
            </AnimatedSection>
            <AnimatedSection delay={0.2}>
                <div style={{position:'relative',display:'flex',justifyContent:'center',alignItems:'center'}}>
                    <div style={{width:'100%',maxWidth:'500px',aspectRatio:'4/3',background:'var(--bg-soft)',
                        borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',
                        border:'1px solid var(--line)',overflow:'hidden'}}>
                           <img
                                src="Assets/img/Baner.png"
                                alt="Equipo TaoTech colaborando"
                                style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}
                            />
                    </div>
                    <div style={{position:'absolute',top:'-10px',right:'-10px',background:'var(--white)',
                        padding:'clamp(0.6rem,2vw,1rem) clamp(0.8rem,2vw,1.5rem)',borderRadius:'8px',
                        border:'1px solid var(--line)',display:'flex',alignItems:'center',gap:'0.6rem',animation:'float 4s ease-in-out infinite'}}>
                        <div style={{width:'36px',height:'36px',background:'var(--icon-bg)',borderRadius:'50%',
                            display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem'}}>💻</div>
                        <div>
                            <div style={{fontWeight:'700',color:'var(--ink)',fontSize:'0.85rem'}}>+20 Proyectos</div>
                            <div style={{fontSize:'0.75rem',color:'var(--ink-soft)'}}>Completados</div>
                        </div>
                    </div>
